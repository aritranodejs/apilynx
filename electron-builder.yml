appId: com.apilynx.app
productName: Apilynx
copyright: Copyright © 2026 Aritra Dutta

directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*
  - out/**/*
  - build/icon.png
  - package.json

# Bundle .env at build time (must exist locally). For per-user config, use ~/.config/Apilynx/.env
extraResources:
  - .env

extraMetadata:
  main: dist-electron/electron/main.js

mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64

dmg:
  title: Apilynx ${version}
  icon: build/icon.png

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

linux:
  icon: build/icon.png
  executableName: apilynx
  category: Development
  maintainer: Aritra Dutta <aritra@apilynx.app>
  synopsis: Modern API testing desktop application
  description: Apilynx — API client for testing REST, GraphQL, collections, environments, and team workspaces.
  desktop:
    Name: Apilynx
    Comment: API testing desktop application
    Categories: Development;Network;
    StartupWMClass: apilynx
  target:
    - target: deb
      arch:
        - x64
    - target: AppImage
      arch:
        - x64

deb:
  packageName: apilynx
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Apilynx
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  uninstallDisplayName: Apilynx
  artifactName: Apilynx-Setup-${version}.${ext}

publish: null
