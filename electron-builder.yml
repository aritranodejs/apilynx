appId: com.apilynx.app
productName: Apilynx
copyright: Copyright © 2026 Aritra Dutta

directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*
  - out/**/*
  - build/icon.png
  - package.json

# Bundle .env at build time (must exist locally). For per-user config, use ~/.config/Apilynx/.env
extraResources:
  - .env

extraMetadata:
  main: dist-electron/electron/main.js

mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  maintainer: Aritra Dutta <aritra@apilynx.app>

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

publish: null
