appId: com.reqforge.app
productName: ReqForge
copyright: Copyright © 2026 Aritra Dutta

directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*
  - out/**/*
  - package.json

extraMetadata:
  main: dist-electron/electron/main.js

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

publish: null
